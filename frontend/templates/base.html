<!-- frontend/templates/base.html -->
<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}VaultLock{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              vault: {
                bg: "#0f1117",
                surface: "#1a1d27",
                card: "#21253a",
                border: "#2e3350",
                accent: "#6c63ff",
                hover: "#7c74ff",
              },
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0f1117;
      }

      /* Flash message animations */
      .flash-msg {
        animation: slideDown 0.3s ease;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body class="text-gray-100 min-h-screen">
    <!-- Flash messages — shown at the top of every page -->
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80">
      {% for category, message in messages %}
      <div
        class="flash-msg px-4 py-3 rounded-lg text-sm font-medium shadow-lg {% if category == 'error' %} bg-red-500/20 border border-red-500/50 text-red-300 {% elif category == 'success' %}bg-green-500/20 border border-green-500/50 text-green-300 {% else %} bg-blue-500/20 border border-blue-500/50 text-blue-300 {% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %} {% block content %}{% endblock %}
  </body>
</html>
