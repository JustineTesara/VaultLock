<!-- frontend/templates/register.html -->
{% extends "base.html" %} {% block title %}Create Account — CipherNest{%
endblock %} {% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 mb-4"
      >
        <svg
          class="w-8 h-8 text-indigo-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">
        <span style="color: #e0e0f0; font-weight: 700">Cipher</span
        ><span style="color: #a09bff; font-weight: 300">Nest</span>
      </h1>
      <p class="text-gray-400 text-sm mt-1">
        Create your nest — your master password encrypts everything
      </p>
    </div>

    <div
      class="bg-[#1a1d27] border border-[#2e3350] rounded-2xl p-8 shadow-2xl"
    >
      <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Email address</label
          >
          <input
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full px-4 py-3 rounded-xl bg-[#0f1117] border border-[#2e3350] text-gray-100 placeholder-gray-600 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            placeholder="you@example.com"
          />
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Master password</label
          >
          <div class="relative">
            <input
              type="password"
              name="password"
              id="regPassword"
              required
              oninput="checkStrength(this.value)"
              class="w-full px-4 py-3 rounded-xl bg-[#0f1117] border border-[#2e3350] text-gray-100 placeholder-gray-600 text-sm pr-12 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
              placeholder="Min. 8 characters"
            />
            <button
              type="button"
              onclick="toggleVisibility('regPassword', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"
            >
              <svg
                class="w-8 h-8"
                viewBox="0 0 32 32"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M16 3 L24 7.5 L24 18 Q24 24 16 29 Q8 24 8 18 L8 7.5 Z"
                  stroke="#a09bff"
                  stroke-width="1.5"
                  stroke-linejoin="round"
                  fill="none"
                />
                <line
                  x1="12"
                  y1="14"
                  x2="20"
                  y2="14"
                  stroke="#a09bff"
                  stroke-width="1.3"
                  stroke-linecap="round"
                />
                <line
                  x1="12"
                  y1="18"
                  x2="20"
                  y2="18"
                  stroke="#a09bff"
                  stroke-width="1.3"
                  stroke-linecap="round"
                />
                <line
                  x1="12"
                  y1="22"
                  x2="17"
                  y2="22"
                  stroke="#a09bff"
                  stroke-width="1.3"
                  stroke-linecap="round"
                />
                <circle cx="16" cy="10" r="2" fill="#6c63ff" />
              </svg>
            </button>
          </div>

          <!-- Password strength bar -->
          <div
            class="mt-2 h-1.5 w-full bg-[#0f1117] rounded-full overflow-hidden"
          >
            <div
              id="strengthBar"
              class="h-full rounded-full transition-all duration-300 w-0"
            ></div>
          </div>
          <p id="strengthLabel" class="text-xs text-gray-600 mt-1"></p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Confirm master password</label
          >
          <input
            type="password"
            name="confirm_password"
            required
            class="w-full px-4 py-3 rounded-xl bg-[#0f1117] border border-[#2e3350] text-gray-100 placeholder-gray-600 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            placeholder="Repeat your password"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-colors duration-200 text-sm shadow-lg shadow-indigo-600/20"
        >
          Create Vault
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a
          href="{{ url_for('auth.login') }}"
          class="text-indigo-400 hover:text-indigo-300 transition-colors"
        >
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>

<script>
  function toggleVisibility(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === "password" ? "text" : "password";
  }

  function checkStrength(password) {
    const bar = document.getElementById("strengthBar");
    const label = document.getElementById("strengthLabel");
    let score = 0;

    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    const levels = [
      { width: "0%", color: "", text: "" },
      { width: "20%", color: "bg-red-500", text: "Very weak" },
      { width: "40%", color: "bg-orange-500", text: "Weak" },
      { width: "60%", color: "bg-yellow-500", text: "Fair" },
      { width: "80%", color: "bg-blue-500", text: "Strong" },
      { width: "100%", color: "bg-green-500", text: "Very strong" },
    ];

    const level = levels[score] || levels[0];
    bar.className = `h-full rounded-full transition-all duration-300 ${level.color}`;
    bar.style.width = level.width;
    label.textContent = level.text;
    label.className = `text-xs mt-1 ${
      score <= 1
        ? "text-red-400"
        : score === 2
          ? "text-orange-400"
          : score === 3
            ? "text-yellow-400"
            : score === 4
              ? "text-blue-400"
              : "text-green-400"
    }`;
  }

  setTimeout(() => {
    document.querySelectorAll(".flash-msg").forEach((el) => {
      el.style.transition = "opacity .5s";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 500);
    });
  }, 4000);
</script>
{% endblock %}
