<!-- frontend/templates/forgot.html -->
{% extends "base.html" %} {% block title %}Forgot Password — CipherNest{%
endblock %} {% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
        style="background: #6c63ff18; border: 1px solid #6c63ff33"
      >
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <path
            d="M16 3L24 7.5L24 18Q24 24 16 29Q8 24 8 18L8 7.5Z"
            stroke="#a09bff"
            stroke-width="2"
            stroke-linejoin="round"
          />
          <line
            x1="12"
            y1="14"
            x2="20"
            y2="14"
            stroke="#a09bff"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="12"
            y1="18"
            x2="20"
            y2="18"
            stroke="#a09bff"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="12"
            y1="22"
            x2="17"
            y2="22"
            stroke="#a09bff"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <circle cx="16" cy="10" r="2.5" fill="#6c63ff" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Forgot your password?</h1>
      <p class="text-gray-400 text-sm mt-1">
        Enter your email and we'll send you a reset link
      </p>
    </div>

    <div
      class="rounded-2xl p-8 shadow-2xl"
      style="background: #1a1d27; border: 1px solid #2e3350"
    >
      <form method="POST" action="{{ url_for('reset.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="mb-6">
          <label class="block text-sm font-medium mb-2" style="color: #9ba3c2">
            Email address
          </label>
          <input
            type="email"
            name="email"
            required
            autofocus
            class="w-full px-4 py-3 rounded-xl text-sm outline-none transition-colors"
            style="
              background: #0f1117;
              border: 1px solid #2a2d42;
              color: #c8cae8;
            "
            placeholder="you@example.com"
            onfocus="this.style.borderColor = '#6c63ff'"
            onblur="this.style.borderColor = '#2a2d42'"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3 rounded-xl text-sm font-semibold text-white"
          style="background: #6c63ff"
        >
          Send Reset Link
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color: #4a5080">
        Remembered it?
        <a href="{{ url_for('auth.login') }}" style="color: #a09bff"
          >Back to login</a
        >
      </p>
    </div>
  </div>
</div>
{% endblock %}
